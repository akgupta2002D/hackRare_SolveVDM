<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Floater Physics MVP (PNG → Objects → Lag)</title>
    <link rel="stylesheet" href="./floater_physics_mvp.css" />
  </head>
  <body>
    <div id="bar">
      <label>
        Upload floater PNG:
        <input id="file" type="file" accept="image/png,image/*" />
      </label>

      <label>
        Lag severity
        <input id="lag" type="range" min="0" max="100" step="1" value="60" />
        <span id="lagVal" class="pill"></span>
      </label>

      <label>
        FOV shape
        <select id="fovShape">
          <option value="oval" selected>Oval</option>
          <option value="box">Box</option>
        </select>
      </label>

      <span id="info" class="pill">No image loaded</span>
      <small>Drag on canvas to “move camera” (mouse pan).</small>
    </div>

    <canvas id="cv"></canvas>
    <script type="module" src="./floater_mvp_app.js"></script>
  </body>
</html>
